# FILE: docker-compose.yaml
# VERSION: 2.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Development compose stack with PostgreSQL (pgvector) and MCP app for local development
#   SCOPE: Runs a pgvector-enabled PostgreSQL instance and the Bun-based MCP server with local source mounted
#   DEPENDS: (none - standalone orchestration)
#   LINKS: M-DOCKER-DEV -> M-DOCKER-IMAGE, M-DOCKER-DEV -> M-SERVER, M-DOCKER-DEV -> M-CONFIG, M-DOCKER-DEV -> M-DB
# END_MODULE_CONTRACT

# START_CHANGE_SUMMARY
#   LAST_CHANGE: [v2.0.0 - Add postgres service with pgvector, wire mcp app to depend on it, enable DEV_MODE by default]
#   PREVIOUS: [v1.2.0 - Add required ROOT_AUTH_TOKEN and DATABASE_URL env bindings for post-Phase-4 config contract]
# END_CHANGE_SUMMARY

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: japan_travel_rag
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d japan_travel_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: ["bun", "--hot", "run", "index.ts"]
    environment:
      DEV_MODE: "true"
      DATABASE_URL: postgresql://dev:dev@postgres:5432/japan_travel_rag
      ROOT_AUTH_TOKEN: dev-root-token
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
