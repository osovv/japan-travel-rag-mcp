# FILE: docker-compose.yaml
# VERSION: 1.1.0
# START_MODULE_CONTRACT
#   PURPOSE: Development compose stack for a single MCP HTTP service
#   SCOPE: Runs the Bun-based MCP server with local source mounted and env loaded from .env
#   DEPENDS: (none - standalone orchestration)
#   LINKS: M-DOCKER-DEV -> M-DOCKER-IMAGE, M-DOCKER-DEV -> M-SERVER, M-DOCKER-DEV -> M-CONFIG
# END_MODULE_CONTRACT

# START_CHANGE_SUMMARY
#   LAST_CHANGE: [v1.1.0 - Switch mcp service to build-based image while keeping source bind mount for development]
#   PREVIOUS: [v1.0.0 - Initial development compose definition for single mcp service]
# END_CHANGE_SUMMARY

x-shared-env: &shared-env
  env_file: .env
  environment:
    TG_CHAT_RAG_BASE_URL: ${TG_CHAT_RAG_BASE_URL:-http://localhost:8787}
    TG_CHAT_RAG_BEARER_TOKEN: ${TG_CHAT_RAG_BEARER_TOKEN:-dev-token}
    TG_CHAT_RAG_CHAT_IDS: ${TG_CHAT_RAG_CHAT_IDS:-}
    PORT: ${PORT:-3000}
    TG_CHAT_RAG_TIMEOUT_MS: ${TG_CHAT_RAG_TIMEOUT_MS:-15000}

services:
  # START_BLOCK_MCP_SERVICE
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    command: ["bun", "run", "index.ts"]
    <<: *shared-env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/healthz').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
  # END_BLOCK_MCP_SERVICE
