# FILE: docker-compose.prod.yaml
# VERSION: 1.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Production compose stack for a single MCP HTTP service
#   SCOPE: Runs the Bun-based MCP server with explicit required env vars on external coolify network
#   DEPENDS: (none - standalone orchestration)
#   LINKS: M-DOCKER-PROD -> M-SERVER, M-DOCKER-PROD -> M-CONFIG
# END_MODULE_CONTRACT

# START_CHANGE_SUMMARY
#   LAST_CHANGE: [v1.0.0 - Initial production compose definition for single mcp service]
# END_CHANGE_SUMMARY

x-shared-env: &shared-env
  environment:
    TG_CHAT_RAG_BASE_URL: ${TG_CHAT_RAG_BASE_URL:?}
    TG_CHAT_RAG_BEARER_TOKEN: ${TG_CHAT_RAG_BEARER_TOKEN:?}
    TG_CHAT_RAG_CHAT_IDS: ${TG_CHAT_RAG_CHAT_IDS:?}
    PORT: ${PORT:-3000}
    TG_CHAT_RAG_TIMEOUT_MS: ${TG_CHAT_RAG_TIMEOUT_MS:-15000}
  networks:
    - coolify

services:
  # START_BLOCK_MCP_SERVICE
  mcp:
    image: oven/bun:1.3.8
    working_dir: /app
    volumes:
      - ./:/app
    command: ["bun", "run", "index.ts"]
    <<: *shared-env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/healthz').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
  # END_BLOCK_MCP_SERVICE

networks:
  coolify:
    external: true
