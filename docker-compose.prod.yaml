# FILE: docker-compose.prod.yaml
# VERSION: 2.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Production compose stack for API server and worker processes
#   SCOPE: Runs the Bun-based MCP API server and curated-sites ingestion worker with explicit required env vars on external coolify network
#   DEPENDS: (none - standalone orchestration)
#   LINKS: M-DOCKER-PROD -> M-DOCKER-IMAGE, M-DOCKER-PROD -> M-SERVER, M-DOCKER-PROD -> M-WORKER-ENTRYPOINT, M-DOCKER-PROD -> M-CONFIG
# END_MODULE_CONTRACT

# START_CHANGE_SUMMARY
#   LAST_CHANGE: [v2.0.0 - Rename mcp service to japan-travel-rag-api, add japan-travel-rag-worker service, add proxy env vars for Spider/Voyage API access, add Logto/portal env vars]
#   PREVIOUS: [v1.2.0 - Add required ROOT_AUTH_TOKEN and DATABASE_URL env bindings for post-Phase-4 config contract]
# END_CHANGE_SUMMARY

x-shared-env: &shared-env
  environment:
    TG_CHAT_RAG_BASE_URL: ${TG_CHAT_RAG_BASE_URL:?}
    TG_CHAT_RAG_BEARER_TOKEN: ${TG_CHAT_RAG_BEARER_TOKEN:?}
    TG_CHAT_RAG_CHAT_IDS: ${TG_CHAT_RAG_CHAT_IDS:?}
    ROOT_AUTH_TOKEN: ${ROOT_AUTH_TOKEN:?}
    DATABASE_URL: ${DATABASE_URL:?}
    PORT: ${PORT:-3000}
    TG_CHAT_RAG_TIMEOUT_MS: ${TG_CHAT_RAG_TIMEOUT_MS:-15000}
    PUBLIC_URL: ${PUBLIC_URL:?}
    LOGTO_TENANT_URL: ${LOGTO_TENANT_URL:?}
    LOGTO_CLIENT_ID: ${LOGTO_CLIENT_ID:?}
    LOGTO_CLIENT_SECRET: ${LOGTO_CLIENT_SECRET:?}
    PORTAL_SESSION_SECRET: ${PORTAL_SESSION_SECRET:?}
    LOGTO_PORTAL_APP_ID: ${LOGTO_PORTAL_APP_ID:?}
    LOGTO_PORTAL_APP_SECRET: ${LOGTO_PORTAL_APP_SECRET:?}
    LOGTO_M2M_APP_ID: ${LOGTO_M2M_APP_ID:?}
    LOGTO_M2M_APP_SECRET: ${LOGTO_M2M_APP_SECRET:?}
    LOGTO_MANAGEMENT_API_RESOURCE: ${LOGTO_MANAGEMENT_API_RESOURCE:?}
    LOGTO_MCP_USER_ROLE_ID: ${LOGTO_MCP_USER_ROLE_ID:?}
    PROXY_BASE_URL: ${PROXY_BASE_URL:?}
    PROXY_SECRET: ${PROXY_SECRET:?}
    VOYAGE_API_KEY: ${VOYAGE_API_KEY:?}
    SPIDER_API_KEY: ${SPIDER_API_KEY:?}
    OAUTH_SESSION_SECRET: ${OAUTH_SESSION_SECRET:?}
  networks:
    - coolify

services:
  # START_BLOCK_API_SERVICE
  japan-travel-rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: ["bun", "run", "index.ts"]
    <<: *shared-env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.japan-mcp.rule=Host(`japan-travel-rag-mcp.osovv.dev`)"
      - "traefik.http.routers.japan-mcp.entrypoints=http"
      - "traefik.http.services.japan-mcp.loadbalancer.server.port=3002"
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/healthz').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
  # END_BLOCK_API_SERVICE

  # START_BLOCK_WORKER_SERVICE
  japan-travel-rag-worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: ["bun", "run", "src/worker-main.ts"]
    <<: *shared-env
    restart: unless-stopped
  # END_BLOCK_WORKER_SERVICE

networks:
  coolify:
    external: true
